  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

SubmitFn }}\" style=\"margin-top:22px; width:100%; padding:11px 0; border-radius:9px; border:none; background:#155EEF; color:#fff; font-size:14px; font-weight:600; font-family:inherit; cursor:pointer;\" style-hover=\"background:#004EEB;\">Đóng<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fmain>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { role: 'center', screen: 'center/dashboard', range: '30', step: 1, exCat: 'all', modal: null, assignMode: 'class', assignedClass: 0, navOpen: true, resultMode: 'ai', notifOpen: false, writingAsg: null, activeTask: 1, wcount: 0, submitOk: false, leftPct: 49, saveStatus: '', wErr: '', aiDetailOpen: false, aiFilter: 'all', aiActiveId: null, aiHoverId: null, aiPop: null, aiView: 'orig', aiItems: null, aiItemsMap: null, aiTask: 1, aiIsMock: false, aiSel: null, aiAddOpen: false, aiNewCat: 'GRA', aiPromptH: null, aiImgZoom: 1, aiImgX: 0, aiImgY: 0, aiChartPopup: false, aiEditId: null, aiEditCat: 'GRA' };\n\n  toggleNav = () => this.setState(s => ({ navOpen: !s.navOpen }));\n  toggleNotif = () => this.setState(s => ({ notifOpen: !s.notifOpen }));\n  closeNotif = () => this.setState({ notifOpen: false });\n  openMobileNav = () => this.setState({ mobileNav: true, navOpen: true });\n  closeMobileNav = () => this.setState({ mobileNav: false });\n  openReview = (card) => this.setState({ reviewAsg: card });\n  closeReview = () => this.setState({ reviewAsg: null });\n  openExamDetail = (item) => this.setState({ examDetail: item });\n  closeExamDetail = () => this.setState({ examDetail: null });\n  openGrade = (row) => {\n    const isW = row && row.asgSkill === 'Writing';\n    const isMock = isW && (row.asgTitle || '').indexOf('Mock') >= 0;\n    const initTask = isMock ? 1 : (isW && (row.asgTitle || '').indexOf('Task 1') >= 0 ? 1 : 2);\n    const map = isW ? (isMock ? { 1: this.seedAiItems(1), 2: this.seedAiItems(2) } : { [initTask]: this.seedAiItems(initTask) }) : null;\n    this.setState({ gradeRow: row, aiItemsMap: map, aiTask: initTask, aiIsMock: isMock, aiFilter: 'all', aiActiveId: null, aiHoverId: null, aiPop: null, aiView: 'orig', aiSel: null, aiAddOpen: false, aiImgZoom: 1, aiImgX: 0, aiImgY: 0, aiChartPopup: false });\n  };\n  closeGrade = () => this.setState({ gradeRow: null, aiPop: null, aiSel: null, aiAddOpen: false });\n  switchAiTask = (n) => this.setState({ aiTask: n, aiFilter: 'all', aiActiveId: null, aiHoverId: null, aiPop: null, aiView: 'orig', aiSel: null, aiAddOpen: false, aiImgZoom: 1, aiImgX: 0, aiImgY: 0, aiChartPopup: false });\n\n  // ===== AI Writing feedback detail =====\n  AI_CAT = {\n    GRA: { label: 'GRA', name: 'Ngữ pháp', bg: '#FEF3F2', text: '#B42318', line: '#F04438', soft: '#FEE4E2' },\n    LR: { label: 'LR', name: 'Từ vựng', bg: '#FFFAEB', text: '#B54708', line: '#F79009', soft: '#FEF0C7' },\n    CC: { label: 'CC', name: 'Liên kết & mạch lạc', bg: '#EFF8FF', text: '#175CD3', line: '#2E90FA', soft: '#D1E9FF' },\n    TA_TR: { label: 'TA_TR', name: 'Đáp ứng đề bài', bg: '#F4F3FF', text: '#6941C6', line: '#7A5AF8', soft: '#E9D7FE' },\n  };\n  aiTaskData(task) {\n    if (task === 1) {\n      return {\n        label: 'Writing Task 1',\n        prompt: 'The line graph below shows the number of tourists visiting a particular Caribbean island between 2010 and 2017. Summarise the information by selecting and reporting the main features, and make comparisons where relevant. Write at least 150 words.',\n        image: 'assets/chart-tourists.png',\n        band: '5.5',\n        teacherNote: 'Bài mô tả đúng xu hướng chính và có câu tổng quan. Cần chú ý hòa hợp chủ ngữ – động từ và tránh so sánh nhất kép (“the most sharpest”). Bổ sung số liệu so sánh cụ thể giữa hai nhóm du khách để đạt band cao hơn.',\n        essay: 'The line graph illustrates the number of tourists who visited a Caribbean island between 2010 and 2017. Overall, the total number of visitors increased steadily over the whole period.\\n\\nIn 2010, there was approximately one million tourists in total. At the beginning, the number of people staying on the island were higher than those arriving on cruise ships. By 2017, the figure for cruise ship visitors have risen dramatically to around two million, overtaking the other group.\\n\\nIn conclusion, both categories saw a growth, however cruise ship tourists experienced the most sharpest increase across the period.',\n        items: [\n          { id: 'a1', category: 'GRA', errorType: 'Hòa hợp chủ ngữ – động từ', original: 'there was approximately one million tourists', suggested: 'there were approximately one million tourists', explanation: '“tourists” số nhiều nên dùng “there were”.', translation: 'có khoảng một triệu du khách' },\n          { id: 'a2', category: 'GRA', errorType: 'Hòa hợp chủ ngữ – động từ', original: 'were higher', suggested: 'was higher', explanation: 'Chủ ngữ “the number of people” là số ít nên động từ chia “was higher”.', translation: 'cao hơn' },\n          { id: 'a3', category: 'GRA', errorType: 'Thì động từ', original: 'have risen', suggested: 'had risen', explanation: 'Mô tả mốc đã hoàn tất trước 2017 trong quá khứ nên dùng quá khứ hoàn thành “had risen”.', translation: 'đã tăng' },\n          { id: 'a5', category: 'LR', errorType: 'Từ vựng', original: 'saw a growth', suggested: 'saw growth', explanation: '“growth” khi mang nghĩa chung là danh từ không đếm được, không cần mạo từ “a”.', translation: 'có sự tăng trưởng' },\n          { id: 'a6', category: 'CC', errorType: 'Liên từ', original: 'however cruise ship', suggested: 'but cruise ship', explanation: 'Trong câu này nên dùng liên từ “but” thay vì “however” để nối hai vế cho mạch lạc.', translation: 'nhưng tàu du lịch' },\n          { id: 'a4', category: 'GRA', errorType: 'So sánh nhất kép', original: 'the most sharpest', suggested: 'the sharpest', explanation: '“sharpest” đã là cấp so sánh nhất, không thêm “most”.', translation: 'tăng mạnh nhất' },\n        ],\n        crit: [\n          { cat: 'TA_TR', name: 'Đáp ứng đề bài', score: '5.5', analysis: 'Bài có câu tổng quan (overview) và nêu được xu hướng chính. Tuy nhiên một số số liệu mô tả còn thiếu so sánh cụ thể giữa hai nhóm du khách.' },\n          { cat: 'CC', name: 'Liên kết & mạch lạc', score: '6.0', analysis: 'Bố cục rõ ràng theo mở – thân – kết. Cần dùng liên từ chính xác hơn (lỗi “however” đứng giữa câu) để mạch lạc hơn.' },\n          { cat: 'LR', name: 'Từ vựng', score: '5.0', analysis: 'Vốn từ mô tả biểu đồ ở mức cơ bản, lặp lại “number/visitors”. Nên đa dạng hóa với “figure, proportion, climbed, surged”.' },\n          { cat: 'GRA', name: 'Ngữ pháp & độ chính xác', score: '5.5', analysis: 'Còn nhiều lỗi hòa hợp chủ ngữ – động từ, thì và so sánh nhất kép. Đây là điểm cần ưu tiên cải thiện ở Task 1.' },\n        ],\n      };\n    }\n    return {\n      label: 'Writing Task 2',\n      prompt: 'Some people think that technology has made education more effective, while others believe it distracts learners. Discuss both views and give your own opinion. Write at least 250 words.',\n      band: '6.5',\n      teacherNote: 'Bài viết có cấu trúc rõ ràng, lập luận hai chiều cân đối. Cần đa dạng hơn về cấu trúc câu phức và một số lỗi mạo từ nhỏ. Phát triển ý ở đoạn 2 tốt, ví dụ thuyết phục.',\n      essay: 'In recent years, many people believe that technology has made our lives more easier than before. While this is true to some extent, I would argue that a lot of problems have also appeared alongside these benefits.\\n\\nFirstly, the technology allows us to communicate instantly across the world. For example, a student in Vietnam can attended an online class hosted in London without any difficulty. This good thing would have been impossible just two decades ago.\\n\\nHowever, an over-reliance on devices have reduced face-to-face interaction. Many young people today prefer texting rather than to meet their friends in person, which may weaken real social bonds.',\n      items: [\n        { id: 'm1', category: 'GRA', errorType: 'So sánh kép', original: 'more easier', suggested: 'easier', explanation: '“more easier” lặp cấp so sánh. Tính từ ngắn “easy” chỉ cần một dạng so sánh duy nhất là “easier”.', translation: 'dễ dàng hơn' },\n        { id: 'm2', category: 'LR', errorType: 'Từ vựng học thuật', original: 'a lot of', suggested: 'numerous', explanation: '“a lot of” thiên về văn nói. Trong Writing Task 2 nên dùng “numerous” hoặc “many” để trang trọng hơn.', translation: 'nhiều' },\n        { id: 'm3', category: 'GRA', errorType: 'Mạo từ', original: 'the technology', suggested: 'technology', explanation: '“technology” là danh từ không đếm được mang nghĩa chung, do đó không cần mạo từ “the”.', translation: 'công nghệ' },\n        { id: 'm4', category: 'GRA', errorType: 'Chia động từ', original: 'attended', suggested: 'attend', explanation: 'Sau động từ khuyết thiếu “can” phải dùng động từ nguyên thể: “can attend”.', translation: 'tham gia' },\n        { id: 'm5', category: 'LR', errorType: 'Từ vựng học thuật', original: 'good thing', suggested: 'advancement', explanation: '“good thing” quá phổ thông cho văn viết Task 2. Dùng “advancement” để học thuật hơn.', translation: 'tiến bộ' },\n        { id: 'm6', category: 'GRA', errorType: 'Hòa hợp chủ ngữ – động từ', original: 'have', suggested: 'has', explanation: 'Chủ ngữ “an over-reliance” là số ít nên động từ phải chia “has reduced”.', translation: 'đã làm giảm' },\n        { id: 'm7', category: 'CC', errorType: 'Cấu trúc câu', original: 'to meet', suggested: 'meeting', explanation: 'Sau “prefer ... rather than” dùng V-ing: “prefer texting rather than meeting”.', translation: 'gặp gỡ' },\n      ],\n      crit: [\n        { cat: 'TA_TR', name: 'Đáp ứng đề bài', score: '6.5', analysis: 'Bài viết trả lời đúng yêu cầu đề, thảo luận cả hai quan điểm và nêu lập trường cá nhân rõ ràng. Một số ý ở đoạn thân bài còn có thể phát triển sâu hơn bằng ví dụ cụ thể để thuyết phục hơn.' },\n        { cat: 'CC', name: 'Liên kết & mạch lạc', score: '7.0', analysis: 'Bố cục rõ ràng với mở – thân – kết mạch lạc, sử dụng từ nối hợp lý. Liên kết giữa các câu nhìn chung tốt; có thể đa dạng hơn về phương tiện liên kết để đạt band cao hơn.' },\n        { cat: 'LR', name: 'Từ vựng', score: '6.0', analysis: 'Vốn từ đủ để truyền đạt ý, nhưng còn một số cụm thiên về văn nói (“a lot of”, “good thing”). Nên thay bằng từ vựng học thuật và đa dạng collocation để nâng band.' },\n        { cat: 'GRA', name: 'Ngữ pháp & độ chính xác', score: '6.5', analysis: 'Cấu trúc câu khá đa dạng nhưng còn lỗi nhỏ về mạo từ, so sánh kép và hòa hợp chủ ngữ – động từ. Khắc phục các lỗi này sẽ cải thiện rõ độ chính xác.' },\n      ],\n    };\n  }\n  AIWRITING() { return this.aiTaskData(2); }\n  assetUrl(p) { if (!p) return p; const m = { 'assets/chart-tourists.png': 'chartTourists', 'assets/chart-population.png': 'chartPopulation' }; const r = (typeof window !== 'undefined') && window.__resources; const id = m[p]; return (r && id && r[id]) || p; }\n  seedAiItems(task) {\n    const data = this.aiTaskData(task || 2); let cur = 0;\n    return data.items.map(it => {\n      const idx = data.essay.indexOf(it.original, cur);\n      const start = idx < 0 ? -1 : idx, end = idx < 0 ? -1 : idx + it.original.length;\n      if (idx >= 0) cur = end;\n      return { ...it, start, end, teacher: false };\n    });\n  }\n  openAiDetail = () => this.setState({ aiDetailOpen: true, aiFilter: 'all', aiActiveId: null, aiHoverId: null, aiPop: null, aiView: 'orig', aiItems: this.seedAiItems(), aiSel: null, aiAddOpen: false, aiNewCat: 'GRA' });\n  closeAiDetail = () => this.setState({ aiDetailOpen: false, aiActiveId: null, aiHoverId: null, aiPop: null, aiSel: null, aiAddOpen: false });\n  setAiEssayTextRef = (el) => { this.aiEssayTextEl = el; };\n  setPromptBoxRef = (el) => { this.promptBoxEl = el; };\n  _attachWheel = (el, key) => {\n    if (this[key] && this[key + 'W']) { this[key
